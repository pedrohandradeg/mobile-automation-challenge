name: iOS Tests (macOS Simulator)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ios-e2e:
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm ci

      - name: Instalar Appium e driver XCUITest
        run: |
          npm install -g appium
          appium driver install xcuitest

      - name: Baixar app iOS (native-demo-app v2.2.0)
        run: |
          mkdir -p apps
          curl -L -o apps/ios.zip https://github.com/webdriverio/native-demo-app/releases/download/v2.2.0/ios.simulator.wdio.native.app.v2.2.0.zip
          unzip apps/ios.zip -d apps/
          ls apps/

      - name: Rodar testes iOS
        run: npm run test:ios

      - name: Gerar relatório Allure
        if: always()
        run: npm run allure:generate

      - name: Publicar evidências (screenshots + relatório Allure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-evidence
          path: |
            reports/screenshots/
            reports/allure-report/
          retention-days: 30