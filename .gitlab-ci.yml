stages:
  - install
  - test
  - report

.default_rules: &default_rules
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

install_dependencies:
  stage: install
  image: node:20-bullseye
  script:
    - npm ci
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour
  <<: *default_rules

test_android_browserstack:
  stage: test
  image: node:20-bullseye
  needs: ["install_dependencies"]
  timeout: 15m
  before_script:
    - mkdir -p apps
    - wget -q https://github.com/webdriverio/native-demo-app/releases/download/v2.2.0/android.wdio.native.app.v2.2.0.apk -O apps/android.apk
    - |
      UPLOAD_RESPONSE=$(curl -s -u "$BROWSERSTACK_USERNAME:$BROWSERSTACK_ACCESS_KEY" \
        -X POST "https://api-cloud.browserstack.com/app-automate/upload" \
        -F "file=@apps/android.apk")
      echo "Resposta do upload: $UPLOAD_RESPONSE"
      APP_URL=$(echo "$UPLOAD_RESPONSE" | grep -o '"app_url":"[^"]*' | cut -d'"' -f4)
      echo "BS_APP_ANDROID_URL=$APP_URL" >> build.env
  script:
    - source build.env
    - export BS_APP_ANDROID_URL=$BS_APP_ANDROID_URL
    - npm run test:android:bs
  artifacts:
    when: always
    reports:
      dotenv: build.env
    paths:
      - reports/screenshots/
      - reports/allure-results/
    expire_in: 7 days
  <<: *default_rules

generate_allure_report:
  stage: report
  image: node:20-bullseye
  needs: ["test_android_browserstack"]
  script:
    - npm run allure:generate
  artifacts:
    when: always
    paths:
      - reports/allure-report/
    expire_in: 30 days
  <<: *default_rules