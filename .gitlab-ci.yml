stages:
  - install
  - test
  - report

variables:
  ANDROID_HOME: "/opt/android-sdk"
  ANDROID_AVD_HOME: "/opt/android-sdk/avd"

.default_rules: &default_rules
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

install_dependencies:
  stage: install
  image: node:20-bullseye
  script:
    - npm ci
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour
  <<: *default_rules

test_android:
  stage: test
  image: node:20-bullseye
  needs: ["install_dependencies"]
  timeout: 30m
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq openjdk-17-jdk-headless unzip wget libpulse0 libglu1-mesa qemu-kvm > /dev/null
    - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
    - mkdir -p $ANDROID_HOME/cmdline-tools
    - wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
    - unzip -q cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
    - mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
    - export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator
    - yes | sdkmanager --licenses > /dev/null || true
    - sdkmanager --install "platform-tools" "platforms;android-33" "system-images;android-33;google_apis;x86_64" "emulator" > /dev/null
    - echo "no" | avdmanager create avd -n test_avd -k "system-images;android-33;google_apis;x86_64" --device "pixel_5"
    - $ANDROID_HOME/emulator/emulator -avd test_avd -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -accel off &
    - adb wait-for-device
    - |
      until adb shell getprop sys.boot_completed | grep -m 1 "1"; do
        echo "Aguardando emulador finalizar o boot..."
        sleep 5
      done
    - echo "Emulador pronto"
    - npm install -g appium
    - appium driver install uiautomator2
  script:
    - npm run wdio
  artifacts:
    when: always
    paths:
      - reports/screenshots/
      - reports/allure-results/
    expire_in: 7 days
  <<: *default_rules

generate_allure_report:
  stage: report
  image: node:20-bullseye
  needs: ["test_android"]
  script:
    - npm run allure:generate
  artifacts:
    when: always
    paths:
      - reports/allure-report/
    expire_in: 30 days
  <<: *default_rules
